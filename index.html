<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>MONITOREO U17 — Selección Argentina</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script src="https://accounts.google.com/gsi/client" async defer></script>
<style>
:root{
  --bg:#0b1622;--card:#112236;--card2:#172d47;--border:#1e3a5a;
  --blue:#74acdf;--white:#e8f0fa;--muted:#6a8aaa;
  --green:#22c55e;--yellow:#f59e0b;--red:#ef4444;
  --green-bg:rgba(34,197,94,.15);--yellow-bg:rgba(245,158,11,.15);--red-bg:rgba(239,68,68,.15);
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--white);min-height:100vh;font-size:14px}
/* HEADER */
.hdr{display:flex;align-items:center;justify-content:space-between;padding:12px 24px;background:linear-gradient(135deg,#0d1f35 0%,#1a3a6e 100%);border-bottom:2px solid var(--blue);gap:16px}
.hdr-left{display:flex;align-items:center;gap:14px}
.hdr-flag{width:48px;height:32px;background:linear-gradient(to bottom,#74acdf 33%,#fff 33%,#fff 66%,#74acdf 66%);border:1px solid #aaa;border-radius:2px;flex-shrink:0}
.hdr-title{font-size:20px;font-weight:800;color:var(--white);letter-spacing:1px}
.hdr-sub{font-size:11px;color:var(--blue);text-transform:uppercase;letter-spacing:2px}
.hdr-right{display:flex;align-items:center;gap:12px}
.last-updated{font-size:11px;color:var(--muted)}
.btn-refresh{background:linear-gradient(135deg,#1a5cb8,#0f8fd4);color:#fff;border:none;padding:9px 18px;border-radius:8px;font-weight:700;font-size:13px;cursor:pointer;letter-spacing:.5px;transition:all .2s;white-space:nowrap}
.btn-refresh:hover{transform:translateY(-1px);box-shadow:0 4px 16px rgba(20,100,220,.4)}
.btn-refresh.spinning{animation:spin-pulse .6s ease-in-out 3}
@keyframes spin-pulse{0%{opacity:1}50%{opacity:.4}100%{opacity:1}}
/* TABS NAV */
.tabs-nav{display:flex;overflow-x:auto;background:var(--card);border-bottom:1px solid var(--border);gap:0}
.tabs-nav::-webkit-scrollbar{height:3px}
.tabs-nav::-webkit-scrollbar-thumb{background:var(--border)}
.tab-btn{background:none;border:none;color:var(--muted);padding:13px 20px;font-size:13px;font-weight:600;cursor:pointer;white-space:nowrap;border-bottom:3px solid transparent;transition:all .15s}
.tab-btn:hover{color:var(--white);background:rgba(255,255,255,.04)}
.tab-btn.active{color:var(--blue);border-bottom-color:var(--blue)}
/* MAIN */
main{padding:20px 24px;max-width:1400px;margin:0 auto}
.tab-panel{display:none}
.tab-panel.active{display:block}
/* CARDS */
.cards-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:12px;margin-bottom:20px}
.card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:16px}
.card-label{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:6px}
.card-value{font-size:24px;font-weight:800;color:var(--white)}
.card-sub{font-size:11px;color:var(--muted);margin-top:4px}
/* TABLES */
.tbl-wrap{overflow-x:auto;border-radius:10px;border:1px solid var(--border)}
table{width:100%;border-collapse:collapse;background:var(--card)}
th{background:var(--card2);color:var(--blue);font-size:11px;text-transform:uppercase;letter-spacing:.8px;padding:10px 12px;text-align:left;white-space:nowrap;font-weight:700}
td{padding:9px 12px;border-top:1px solid var(--border);font-size:13px;color:var(--white);white-space:nowrap}
tr:hover td{background:rgba(116,172,223,.06)}
/* TRAFFIC LIGHTS */
.pill{display:inline-flex;align-items:center;gap:5px;padding:3px 10px;border-radius:20px;font-size:12px;font-weight:600}
.pill-green{background:var(--green-bg);color:var(--green)}
.pill-yellow{background:var(--yellow-bg);color:var(--yellow)}
.pill-red{background:var(--red-bg);color:var(--red)}
.dot{width:8px;height:8px;border-radius:50%}
.dot-green{background:var(--green)}
.dot-yellow{background:var(--yellow)}
.dot-red{background:var(--red)}
/* CHARTS */
.chart-wrap{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:16px;margin-bottom:20px}
.chart-title{font-size:13px;font-weight:700;color:var(--blue);margin-bottom:12px;text-transform:uppercase;letter-spacing:.5px}
.chart-row{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:20px}
@media(max-width:768px){.chart-row{grid-template-columns:1fr}}
/* FILTERS */
.filters{display:flex;gap:10px;margin-bottom:16px;flex-wrap:wrap;align-items:center}
.filter-label{font-size:12px;color:var(--muted)}
select,input[type=text]{background:var(--card2);border:1px solid var(--border);color:var(--white);padding:7px 12px;border-radius:7px;font-size:13px;outline:none}
select:focus,input:focus{border-color:var(--blue)}
select option{background:var(--card2)}
/* SECTION TITLE */
.section-title{font-size:15px;font-weight:700;color:var(--white);margin-bottom:12px;padding-bottom:8px;border-bottom:1px solid var(--border)}
/* STATUS BADGE */
.badge{padding:3px 8px;border-radius:6px;font-size:11px;font-weight:700}
.badge-green{background:var(--green-bg);color:var(--green)}
.badge-yellow{background:var(--yellow-bg);color:var(--yellow)}
.badge-red{background:var(--red-bg);color:var(--red)}
/* WELLNESS CHART CONTAINER */
.player-select-row{display:flex;align-items:center;gap:12px;margin-bottom:16px;flex-wrap:wrap}
.comments-list{margin-top:16px}
.comment-item{background:var(--card2);border-left:3px solid var(--yellow);padding:10px 14px;border-radius:0 8px 8px 0;margin-bottom:8px}
/* WELLNESS EQUIPO */
.mode-toggle{display:flex;gap:0;background:var(--card2);border-radius:8px;padding:3px;border:1px solid var(--border)}
.mode-btn{background:transparent;border:none;color:var(--muted);padding:6px 14px;border-radius:6px;font-size:12px;font-weight:700;cursor:pointer;transition:all .15s}
.mode-btn.active{background:var(--blue);color:#0b1622}
.response-badge{background:var(--card2);border:1px solid var(--border);border-radius:20px;padding:4px 14px;font-size:12px;color:var(--muted)}
.response-badge strong{color:var(--white)}
.alert-box{border-radius:10px;padding:14px 18px;margin-bottom:10px}
.alert-box-red{background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.3)}
.alert-box-yellow{background:rgba(245,158,11,.1);border:1px solid rgba(245,158,11,.3)}
.alert-box-title{font-size:11px;font-weight:800;margin-bottom:10px;text-transform:uppercase;letter-spacing:1px}
.alert-box-red .alert-box-title{color:#ef4444}
.alert-box-yellow .alert-box-title{color:#f59e0b}
.alert-tags{display:flex;flex-wrap:wrap;gap:6px}
.alert-tag-red{padding:4px 10px;border-radius:6px;font-size:12px;font-weight:600;background:rgba(239,68,68,.15);color:#ef4444;border:1px solid rgba(239,68,68,.3)}
.alert-tag-yellow{padding:4px 10px;border-radius:6px;font-size:12px;font-weight:600;background:rgba(245,158,11,.15);color:#f59e0b;border:1px solid rgba(245,158,11,.3)}
.heatmap-cell{text-align:center!important;font-weight:800!important;font-size:17px!important;padding:10px 6px!important}
.dist-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:12px;margin-top:12px}
.dist-card{background:var(--card2);border-radius:10px;padding:14px;border:1px solid var(--border)}
.dist-dim-title{font-size:11px;font-weight:800;color:var(--blue);text-transform:uppercase;letter-spacing:1px;margin-bottom:10px}
.dist-row{display:flex;align-items:flex-start;gap:10px;padding:5px 8px;border-radius:6px;margin-bottom:4px}
.dist-val{font-weight:800;font-size:16px;min-width:16px;text-align:center}
.dist-names{font-size:12px;color:#c8d8ea;line-height:1.5}
/* PLAYER CARD */
.player-profile{display:grid;grid-template-columns:220px 1fr;gap:24px;align-items:start}
@media(max-width:700px){.player-profile{grid-template-columns:1fr}}
.player-avatar-col{display:flex;flex-direction:column;align-items:center;gap:12px}
.player-avatar-ring{width:150px;height:150px;border-radius:50%;background:linear-gradient(135deg,var(--blue),#1a5cb8);padding:3px;cursor:pointer;position:relative;flex-shrink:0}
.player-avatar-img{width:100%;height:100%;border-radius:50%;object-fit:cover;background:var(--card2);display:flex;align-items:center;justify-content:center;font-size:48px;font-weight:800;color:var(--white);overflow:hidden}
.player-avatar-img img{width:100%;height:100%;object-fit:cover;border-radius:50%}
.player-avatar-overlay{position:absolute;inset:0;border-radius:50%;background:rgba(0,0,0,.55);display:flex;flex-direction:column;align-items:center;justify-content:center;opacity:0;transition:.2s;cursor:pointer;font-size:11px;color:#fff;font-weight:700;gap:4px}
.player-avatar-ring:hover .player-avatar-overlay{opacity:1}
.player-name-big{font-size:26px;font-weight:900;color:var(--white);line-height:1.2;margin-bottom:4px}
.player-pos-tag{display:inline-block;padding:3px 12px;border-radius:20px;background:rgba(116,172,223,.15);border:1px solid rgba(116,172,223,.3);color:var(--blue);font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;margin-bottom:16px}
.player-kpi-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:10px;margin-bottom:16px}
.player-kpi{background:var(--card2);border-radius:10px;padding:12px 14px;border:1px solid var(--border)}
.player-kpi-label{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.8px;margin-bottom:6px;font-weight:700}
.player-kpi-val{font-size:22px;font-weight:900;line-height:1}
.player-kpi-sub{font-size:10px;margin-top:4px;font-weight:600}
.estado-banner{border-radius:10px;padding:12px 16px;margin-bottom:16px;display:flex;align-items:center;gap:12px}
.estado-banner-g{background:rgba(34,197,94,.12);border:1px solid rgba(34,197,94,.3)}
.estado-banner-y{background:rgba(245,158,11,.12);border:1px solid rgba(245,158,11,.3)}
.estado-banner-r{background:rgba(239,68,68,.12);border:1px solid rgba(239,68,68,.3)}
.estado-banner-label{font-size:14px;font-weight:800}
.estado-banner-rec{font-size:12px;color:var(--muted);margin-top:2px}
.mc-history{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:10px;margin-top:4px}
.mc-hist-card{background:var(--card2);border-radius:10px;padding:12px;border:1px solid var(--border);border-top:3px solid var(--border)}
.mc-hist-card.active-mc{border-top-color:var(--blue)}
.mc-hist-title{font-size:11px;font-weight:800;color:var(--muted);text-transform:uppercase;letter-spacing:.8px;margin-bottom:8px}
.mc-hist-row{display:flex;justify-content:space-between;align-items:center;padding:3px 0;border-bottom:1px solid rgba(255,255,255,.04)}
.mc-hist-key{font-size:11px;color:var(--muted)}
.mc-hist-val{font-size:12px;font-weight:700}
/* NUEVA SESION FORM */
.ns-header{display:flex;align-items:center;gap:10px;margin-bottom:20px;flex-wrap:wrap}
.ns-header h2{font-size:20px;font-weight:800;color:var(--white);margin:0}
.ns-fields{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:12px;margin-bottom:20px}
.ns-field label{display:block;font-size:10px;font-weight:800;color:var(--muted);text-transform:uppercase;letter-spacing:.8px;margin-bottom:5px}
.ns-field input,.ns-field select{width:100%;background:var(--card2);border:1px solid var(--border);color:var(--white);padding:9px 12px;border-radius:8px;font-size:14px;font-weight:600;outline:none;transition:border .15s}
.ns-field input:focus,.ns-field select:focus{border-color:var(--blue)}
.ns-field input[type=number]{-moz-appearance:textfield}
.ns-players-table{width:100%;border-collapse:collapse;margin-bottom:16px}
.ns-players-table th{background:var(--card2);color:var(--muted);font-size:10px;text-transform:uppercase;letter-spacing:.8px;padding:8px 12px;text-align:left;font-weight:700;position:sticky;top:0}
.ns-players-table td{padding:9px 12px;border-bottom:1px solid rgba(255,255,255,.05);font-size:13px}
.ns-players-table tr:hover td{background:rgba(116,172,223,.04)}
.ns-players-table tr.unchecked td{opacity:.45}
.ns-chk{width:18px;height:18px;accent-color:var(--blue);cursor:pointer}
.ns-summary{background:var(--card2);border:1px solid var(--border);border-radius:10px;padding:12px 16px;display:flex;gap:24px;align-items:center;flex-wrap:wrap;margin-bottom:16px}
.ns-summary-item{text-align:center}
.ns-summary-val{font-size:20px;font-weight:800;color:var(--white)}
.ns-summary-lbl{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.6px}
.btn-save{background:linear-gradient(135deg,#1a5cb8,#74acdf);color:#fff;border:none;padding:12px 28px;border-radius:10px;font-size:14px;font-weight:800;cursor:pointer;transition:opacity .15s;letter-spacing:.3px}
.btn-save:hover{opacity:.85}
.btn-save:disabled{opacity:.4;cursor:not-allowed}
.hist-row-saved{border-left:3px solid var(--blue)}
.hist-row-saved td:first-child::before{content:'APP ';font-size:9px;color:var(--blue);font-weight:800}
.btn-del{background:none;border:none;color:var(--red);cursor:pointer;font-size:14px;padding:2px 6px;border-radius:4px;opacity:.6;transition:.15s}
.btn-del:hover{opacity:1;background:rgba(239,68,68,.1)}
.comment-date{font-size:11px;color:var(--muted)}
.comment-text{font-size:13px;color:var(--white);margin-top:3px}
/* JUGADORES GRID */
.jugadores-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:10px}
.jugador-card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:14px;display:flex;align-items:center;gap:10px}
.jugador-num{width:36px;height:36px;border-radius:50%;background:linear-gradient(135deg,#1a5cb8,#74acdf);display:flex;align-items:center;justify-content:center;font-weight:800;font-size:14px;flex-shrink:0}
.jugador-name{font-size:13px;font-weight:600}
.jugador-pos{font-size:11px;color:var(--muted)}
/* RPE ZONE LEGEND */
.legend-row{display:flex;gap:12px;margin-bottom:12px;flex-wrap:wrap}
.legend-item{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--muted)}
.legend-dot{width:10px;height:10px;border-radius:2px}
/* TOOLTIP OVERRIDE */
.tooltip-box{background:var(--card2)!important;border:1px solid var(--border)!important}
/* EMPTY */
.empty{text-align:center;padding:40px;color:var(--muted);font-size:14px}
/* MISC */
.mb16{margin-bottom:16px}
.mt16{margin-top:16px}
.text-right{text-align:right}
.text-muted{color:var(--muted)}
/* AUTH */
.btn-auth{background:var(--card2);border:1px solid var(--border);color:var(--blue);padding:8px 14px;border-radius:8px;font-size:12px;font-weight:700;cursor:pointer;transition:all .2s;white-space:nowrap;letter-spacing:.3px}
.btn-auth:hover{border-color:var(--blue);background:rgba(116,172,223,.1)}
.btn-auth.connected{color:var(--red);border-color:rgba(239,68,68,.4);background:rgba(239,68,68,.08)}
.live-wrap{display:flex;align-items:center;gap:7px;font-size:12px;color:var(--muted)}
.dot-live{width:8px;height:8px;border-radius:50%;background:var(--green);display:inline-block;animation:blink 2s infinite}
.dot-offline{width:8px;height:8px;border-radius:50%;background:var(--muted);display:inline-block}
.dot-error{width:8px;height:8px;border-radius:50%;background:var(--yellow);display:inline-block}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.35}}
</style>
</head>
<body>

<header class="hdr">
  <div class="hdr-left">
    <div class="hdr-flag"></div>
    <div>
      <div class="hdr-title">MONITOREO U17</div>
      <div class="hdr-sub">Selección Argentina · Vóleibol</div>
    </div>
  </div>
  <div class="hdr-right">
    <div class="live-wrap">
      <span id="live-dot"><span class="dot-offline"></span></span>
      <span id="live-text">Sin conexión</span>
    </div>
    <span class="last-updated" id="last-updated">—</span>
    <button class="btn-auth" id="btn-auth">⟢ Conectar con Google</button>
    <button class="btn-refresh" id="btn-refresh">⟳ MONITOREO U17</button>
  </div>
</header>

<nav class="tabs-nav" id="tabs-nav">
  <button class="tab-btn active" data-tab="grupal">Dashboard Grupal</button>
  <button class="tab-btn" data-tab="metricas">Métricas Ind.</button>
  <button class="tab-btn" data-tab="estimulos">Estímulos</button>
  <button class="tab-btn" data-tab="posiciones">Posiciones</button>
  <button class="tab-btn" data-tab="wellness">Wellness</button>
  <button class="tab-btn" data-tab="rpe">RPE</button>
  <button class="tab-btn" data-tab="base">Base de Datos</button>
  <button class="tab-btn" data-tab="jugadores">Jugadores</button>
</nav>

<main>
  <div id="tab-grupal" class="tab-panel active"></div>
  <div id="tab-metricas" class="tab-panel"></div>
  <div id="tab-estimulos" class="tab-panel"></div>
  <div id="tab-posiciones" class="tab-panel"></div>
  <div id="tab-wellness" class="tab-panel"></div>
  <div id="tab-rpe" class="tab-panel"></div>
  <div id="tab-base" class="tab-panel"></div>
  <div id="tab-jugadores" class="tab-panel"></div>
</main>

<script>
/* ===== GOOGLE OAUTH — SOLO LECTURA, NUNCA ESCRIBE EN EL SHEET ===== */

const CLIENT_ID = '364089274737-pqs25ufhkt5hejb7eard512h8rjjg5ke.apps.googleusercontent.com';
const API_KEY   = 'AIzaSyAo0YHacBhKWpZsVbeNeQxFj7asfZP9IxU';
const SHEET_ID  = '1-6yGXFdXnKuNY4h-gTjJrEwisUAuQtHV6FwbrIUDqN4';
const SCOPE     = 'https://www.googleapis.com/auth/spreadsheets.readonly';

// Nombres exactos de cada pestaña en el Google Sheets (MAYÚSCULAS)
const TABS = {
  wellness  : 'FORM_WELLNESS',
  rpe       : 'FORM_RPE',
  metricas  : 'METRICAS_INDIVIDUALES',
  grupal    : 'DASHBOARD_GRUPAL',
  estimulos : 'DASH_ESTIMULOS',
  posiciones: 'DASH_POSICIONES',
  jugadores : 'LISTA_JUGADORES',
};

let _token       = null;
let _tokenClient = null;
let _connected   = false;
let _lastFetch   = null;
let _autoTimer   = null;

/* ---- Inicializar Google Identity Services ---- */
function initGIS() {
  if (!window.google?.accounts?.oauth2) { setTimeout(initGIS, 200); return; }
  _tokenClient = google.accounts.oauth2.initTokenClient({
    client_id: CLIENT_ID,
    scope: SCOPE,
    callback: async (resp) => {
      if (resp.error) {
        // Si el auto-login silencioso falló, mostrar botón para login manual
        if (resp.error === 'interaction_required' || resp.error === 'login_required') {
          setLiveUI('offline', 'Conectá para ver datos en vivo');
          return;
        }
        setLiveUI('error', 'Error de login');
        return;
      }
      _token = resp.access_token;
      _connected = true;
      localStorage.setItem('gauth_was_connected', '1');
      document.getElementById('btn-auth').textContent = '✕ Desconectar';
      document.getElementById('btn-auth').classList.add('connected');
      setLiveUI('loading', 'Cargando datos en vivo...');
      await loadLiveData();
      startAutoRefresh();
    }
  });
  // Intentar auto-login silencioso si el usuario ya conectó antes
  if (localStorage.getItem('gauth_was_connected')) {
    setLiveUI('loading', 'Reconectando...');
    _tokenClient.requestAccessToken({ prompt: '' });
  }
}
window.addEventListener('load', () => setTimeout(initGIS, 400));

/* ---- Botón conectar / desconectar ---- */
function handleAuth() {
  if (_connected) {
    _connected = false; _token = null;
    localStorage.removeItem('gauth_was_connected');
    if (_autoTimer) clearInterval(_autoTimer);
    document.getElementById('btn-auth').textContent = '⟢ Conectar con Google';
    document.getElementById('btn-auth').classList.remove('connected');
    setLiveUI('offline', 'Sin conexión');
    return;
  }
  if (!_tokenClient) { initGIS(); setTimeout(handleAuth, 500); return; }
  _tokenClient.requestAccessToken({ prompt: '' });
}

/* ---- Indicador visual ---- */
function setLiveUI(state, text) {
  const dot  = document.getElementById('live-dot');
  const txt  = document.getElementById('live-text');
  txt.textContent = text;
  const map  = { live:'dot-live', offline:'dot-offline', loading:'dot-offline', error:'dot-error' };
  dot.innerHTML  = `<span class="${map[state]||'dot-offline'}"></span>`;
}

function timeSince(d) {
  const m = Math.floor((Date.now() - d) / 60000);
  if (m < 1) return 'ahora mismo';
  return `hace ${m} min`;
}

/* ---- Fetch de una pestaña ---- */
async function fetchTab(tab) {
  const url = `https://sheets.googleapis.com/v4/spreadsheets/${SHEET_ID}/values/${encodeURIComponent(tab)}?majorDimension=ROWS&key=${API_KEY}`;
  const res = await fetch(url, { headers: { Authorization: `Bearer ${_token}` } });
  if (res.status === 401) throw new Error('TOKEN_EXPIRED');
  if (!res.ok) throw new Error(`HTTP ${res.status}`);
  return (await res.json()).values || [];
}

/* ---- Parsers — convierten filas crudas al formato interno ---- */
const pn = s => parseFloat(String(s||'0').replace(',','.')) || 0;

function _parseWellness(rows) {
  return rows.slice(1).filter(r=>r[1]).map(r=>[
    (r[0]||'').split(' ')[0], r[1]||'',
    +r[2]||0, +r[3]||0, +r[4]||0, +r[5]||0, +r[6]||0, r[7]||''
  ]);
}
function _parseRPE(rows) {
  return rows.slice(1).filter(r=>r[1]).map(r=>[
    (r[0]||'').split(' ')[0], r[1]||'', +r[2]||0, r[3]||''
  ]);
}
function _parseMetricas(rows) {
  return rows.slice(1).filter(r=>r[0]).map(r=>[
    r[0], +r[1]||0, r[2]||'',
    pn(r[3]), +r[4]||0, pn(r[5]), pn(r[6]),
    pn(r[7]), pn(r[8]), pn(r[9]), pn(r[10]),
    pn(r[11]), pn(r[12]),
    r[13]||'', r[14]||'', r[15]||''
  ]);
}
function _parseGrupal(rows) {
  return rows.slice(1).filter(r=>r[0]).map(r=>[
    +r[0]||0, +r[1]||0, pn(r[2]), pn(r[3]), pn(r[4]), pn(r[5]), pn(r[6])
  ]);
}
function _parseEstimulos(rows) {
  return rows.slice(1).filter(r=>r[0]).map(r=>[
    r[0], +r[1]||0, pn(r[2]), pn(r[3]), pn(r[4]), pn(r[5])
  ]);
}
function _parsePosiciones(rows) {
  return rows.slice(1).filter(r=>r[0]).map(r=>[
    r[0], +r[1]||0, pn(r[2]), pn(r[3]), pn(r[4]), pn(r[5]), pn(r[6])
  ]);
}
function _parseJugadores(rows) {
  return rows.slice(1).filter(r=>r[0]).map(r=>[r[0]||'', r[1]||'']);
}

/* ---- Cargar todos los datos en vivo ---- */
async function loadLiveData() {
  try {
    setLiveUI('loading','Actualizando...');
    const [wR,rR,mR,gR,eR,pR,jR] = await Promise.all([
      fetchTab(TABS.wellness), fetchTab(TABS.rpe),
      fetchTab(TABS.metricas), fetchTab(TABS.grupal),
      fetchTab(TABS.estimulos), fetchTab(TABS.posiciones),
      fetchTab(TABS.jugadores),
    ]);
    // Reemplazar arrays internos EN LUGAR (no modifica el Sheet, solo la memoria de la app)
    WELLNESS_RAW.splice(0, Infinity, ..._parseWellness(wR));
    RPE_RAW.splice(0, Infinity, ..._parseRPE(rR));
    METRICAS_RAW.splice(0, Infinity, ..._parseMetricas(mR));
    GRUPAL_RAW.splice(0, Infinity, ..._parseGrupal(gR));
    ESTIMULOS_RAW.splice(0, Infinity, ..._parseEstimulos(eR));
    POSICIONES_RAW.splice(0, Infinity, ..._parsePosiciones(pR));
    JUGADORES.splice(0, Infinity, ..._parseJugadores(jR));

    _lastFetch = Date.now();
    setLiveUI('live', `En vivo · ${timeSince(_lastFetch)}`);

    const now = new Date();
    document.getElementById('last-updated').textContent =
      `Última actualización: ${now.toLocaleTimeString('es-AR',{hour:'2-digit',minute:'2-digit'})}`;

    // Re-renderizar la pestaña activa con datos nuevos
    const activeTab = document.querySelector('.tab-btn.active')?.dataset.tab;
    if (activeTab) renderActiveTab(activeTab);

  } catch(err) {
    console.error('[MONITOREO] Error al leer el Sheet:', err.message);
    if (err.message === 'TOKEN_EXPIRED') {
      _token = null; _connected = false;
      setLiveUI('offline','Sesión expirada — reconectá');
      document.getElementById('btn-auth').textContent = '⟢ Conectar con Google';
      document.getElementById('btn-auth').classList.remove('connected');
    } else {
      setLiveUI('error', 'Error al actualizar');
    }
  }
}

/* ---- Auto-refresh cada 30 segundos ---- */
function startAutoRefresh() {
  if (_autoTimer) clearInterval(_autoTimer);
  _autoTimer = setInterval(async () => {
    if (_connected && _token) await loadLiveData();
  }, 30000);
}
// Actualizar el texto del indicador cada 10 seg sin refetch

  if (_lastFetch && _connected)
    setLiveUI('live', `En vivo · ${timeSince(_lastFetch)}`);
}, 10000);

/* ===== UTILITIES ===== */

function parseFecha(str) {
  const parts = str.split('/');
  if (parts.length === 3) return new Date(+parts[2], +parts[1]-1, +parts[0]);
  return new Date(str);
}

function fmtNum(n, dec=1) {
  if (n==null||isNaN(n)) return '—';
  return Number(n).toFixed(dec);
}

function fmtInt(n) {
  if (n==null||isNaN(n)) return '—';
  return Math.round(n).toLocaleString('es-AR');
}

function colorCarga(v) {
  if (v < 5000) return 'green';
  if (v <= 7000) return 'yellow';
  return 'red';
}
function colorMono(v) {
  if (v < 5) return 'green';
  if (v <= 8) return 'yellow';
  return 'red';
}
function colorStrain(v) {
  if (v < 20000) return 'green';
  if (v <= 35000) return 'yellow';
  return 'red';
}
function colorACWR(v) {
  if (v >= 0.8 && v <= 1.3) return 'green';
  if (v > 1.3 && v <= 1.5) return 'yellow';
  return 'red';
}
function colorWellness(v) {
  if (v > 18) return 'green';
  if (v >= 15) return 'yellow';
  return 'red';
}
function colorDOMS(v) {
  if (v > 3.5) return 'green';
  if (v >= 2.5) return 'yellow';
  return 'red';
}
function colorDesv(v) {
  if (v > 300) return 'green';
  if (v >= 150) return 'yellow';
  return 'red';
}

function pill(color, text) {
  return `<span class="pill pill-${color}"><span class="dot dot-${color}"></span>${text}</span>`;
}

function badge(estado) {
  let c = 'yellow';
  if (estado.includes('🟢')) c = 'green';
  else if (estado.includes('🔴')) c = 'red';
  const clean = estado.replace(/🟢|🟡|🔴/g,'').trim();
  return `<span class="badge badge-${c}">${clean}</span>`;
}

function pillNum(v, colorFn, fmt='int') {
  const c = colorFn(v);
  const txt = fmt==='int' ? fmtInt(v) : fmtNum(v, fmt==='int2'?0:2);
  return pill(c, txt);
}

const charts = {};
function destroyChart(id) {
  if (charts[id]) { charts[id].destroy(); delete charts[id]; }
}

function makeChart(id, config) {
  destroyChart(id);
  const ctx = document.getElementById(id);
  if (!ctx) return;
  charts[id] = new Chart(ctx, config);
}

function uniqueSorted(arr, fn) {
  return [...new Set(arr.map(fn))].sort();
}

      if (!file) return;
      const reader = new FileReader();
      reader.onload = ev=>{
        savePhoto(jug, ev.target.result);
        document.getElementById('avatar-img').innerHTML = `<img src="${ev.target.result}" alt="${jug}">`;
      };
      reader.readAsDataURL(file);
      inp.value='';
    });
  }

  /* ---- lógica principal ---- */
  function update() {
    const jug = document.getElementById('f-jug-m').value;
    const mc  = document.getElementById('f-mc-m').value;
    if (jug) renderProfile(jug, mc);
    else     renderTable('', mc);
  }

  // Permite hacer clic en el nombre en la tabla para ir al perfil
  window.selectPlayer = function(jug) {
    document.getElementById('f-jug-m').value = jug;
    update();
  };

  update();
  document.getElementById('f-jug-m').addEventListener('change', update);
  document.getElementById('f-mc-m').addEventListener('change', update);
}

    const maximos = rows.filter(r=>r[2]>=9);
    const duros   = rows.filter(r=>r[2]>=7 && r[2]<=8);
    const bajos   = rows.filter(r=>r[2]<=3);
    let alertHtml = '';
    if (maximos.length) alertHtml += `
      <div class="alert-box alert-box-red">
        <div class="alert-box-title">🔴 RPE Máximo (9–10) — Monitorear recuperación</div>
        <div class="alert-tags">${maximos.map(r=>`<span class="alert-tag-red">${r[1]} → RPE ${r[2]}</span>`).join('')}</div>
      </div>`;
    if (duros.length) alertHtml += `
      <div class="alert-box alert-box-yellow">
        <div class="alert-box-title">🟡 RPE Duro (7–8) — Alta intensidad</div>
        <div class="alert-tags">${duros.map(r=>`<span class="alert-tag-yellow">${r[1]} → RPE ${r[2]}</span>`).join('')}</div>
      </div>`;
    if (bajos.length) alertHtml += `
      <div class="alert-box" style="background:rgba(116,172,223,.1);border:1px solid rgba(116,172,223,.3);margin-bottom:10px">
        <div class="alert-box-title" style="color:var(--blue)">🔵 RPE Ligero (1–3) — Verificar si es intencional</div>
        <div class="alert-tags">${bajos.map(r=>`<span style="padding:4px 10px;border-radius:6px;font-size:12px;font-weight:600;background:rgba(116,172,223,.15);color:var(--blue);border:1px solid rgba(116,172,223,.3)">${r[1]} → RPE ${r[2]}</span>`).join('')}</div>
      </div>`;
    if (!alertHtml) alertHtml = `<div style="background:rgba(34,197,94,.1);border:1px solid rgba(34,197,94,.3);border-radius:10px;padding:12px 18px;margin-bottom:10px;color:#22c55e;font-weight:700;font-size:13px">✅ Todos con RPE en zona moderada</div>`;
    document.getElementById('r-alerts').innerHTML = alertHtml;

    // Tabla — ordenada de mayor a menor RPE
    const sorted = [...rows].sort((a,b)=>b[2]-a[2]);
    const avg = rows.length ? (rows.reduce((s,r)=>s+r[2],0)/rows.length).toFixed(1) : '—';

    document.getElementById('r-heatmap').innerHTML = rows.length===0
      ? `<p style="color:var(--muted);padding:16px">Sin respuestas para esta fecha.</p>`
      : `
        <div style="display:flex;gap:20px;margin-bottom:14px;flex-wrap:wrap">
          <span style="font-size:13px;color:var(--muted)">RPE promedio del equipo: <strong style="color:${rpeClr(parseFloat(avg))};font-size:18px">${avg}</strong></span>
          <span style="font-size:13px;color:var(--muted)">Zona: <strong style="color:${rpeClr(parseFloat(avg))}">${rpeZone(Math.round(parseFloat(avg)))}</strong></span>
        </div>
        <table class="doc-table" style="min-width:500px">
          <thead><tr>
            <th>JUGADOR</th>
            <th style="text-align:center">RPE</th>
            <th style="text-align:center">ZONA</th>
            <th>COMENTARIO</th>
          </tr></thead>
          <tbody>${sorted.map(r=>`<tr>
            <td style="font-weight:700;color:var(--white)">${r[1]}</td>
            <td class="heatmap-cell" style="background:${rpeBg(r[2])};color:${rpeClr(r[2])};font-size:22px">${r[2]}</td>
            <td style="text-align:center"><span style="padding:3px 10px;border-radius:12px;font-size:12px;font-weight:700;background:${rpeBg(r[2])};color:${rpeClr(r[2])}">${rpeZone(r[2])}</span></td>
            <td style="color:var(--muted);font-size:12px">${r[3]||'—'}</td>
          </tr>`).join('')}</tbody>
        </table>`;

    // Distribución por valor agrupado en zonas
    const zones = [
      {label:'Ligero', range:[1,2,3], clr:'#22c55e', bg:'rgba(34,197,94,.18)'},
      {label:'Moderado', range:[4,5,6], clr:'#f59e0b', bg:'rgba(245,158,11,.18)'},
      {label:'Duro', range:[7,8], clr:'#ef4444', bg:'rgba(239,68,68,.25)'},
      {label:'Máximo', range:[9,10], clr:'#a78bfa', bg:'rgba(124,58,237,.2)'},
    ];
    let distHtml='';
    zones.forEach(z=>{
      const grp={};
      z.range.forEach(v=>{ grp[v]=[]; });
      rows.forEach(r=>{ if(grp[r[2]]!==undefined) grp[r[2]].push(r[1].split(' ')[0]); });
      const hasData = z.range.some(v=>grp[v].length>0);
      if(!hasData) return;
      distHtml+=`<div class="dist-card" style="border-top:3px solid ${z.clr}">
        <div class="dist-dim-title" style="color:${z.clr}">${z.label}</div>
        ${z.range.map(v=>{
          if(!grp[v].length) return '';
          return `<div class="dist-row" style="background:${z.bg}">
            <span class="dist-val" style="color:${z.clr}">${v}</span>
            <span class="dist-names">${grp[v].join(', ')}</span>
          </div>`;
        }).join('')}
      </div>`;
    });
    document.getElementById('r-dist').innerHTML = distHtml || `<p style="color:var(--muted);padding:8px">Sin datos para esta fecha.</p>`;
  }

  /* ---- VISTA INDIVIDUAL ---- */
  function renderRpeInd() {
    const jug = document.getElementById('sel-jug-r').value;
    const mc  = document.getElementById('sel-mc-r').value;
    document.getElementById('r-chart-title').textContent = `RPE por Sesión — ${jug}`;
    const MC_DATES={'1':['20/04/2026','26/04/2026'],'2':['15/05/2026','18/05/2026'],'3':['08/06/2026','15/06/2026']};
    let data=RPE_RAW.filter(r=>r[1]===jug);
    if(mc){const[from,to]=MC_DATES[mc].map(parseFecha);data=data.filter(r=>{const d=parseFecha(r[0]);return d>=from&&d<=to;});}
    data.sort((a,b)=>parseFecha(a[0])-parseFecha(b[0]));
    const labels=data.map(r=>r[0]);
    const rpes=data.map(r=>r[2]);
    makeChart('c-rpe-ind',{type:'bar',data:{labels,datasets:[{data:rpes,backgroundColor:rpes.map(rpeColor),borderRadius:5,borderColor:'transparent'}]},options:{
      plugins:{legend:{display:false}},
      scales:{x:{ticks:{color:'#6a8aaa',font:{size:10}},grid:{color:'rgba(255,255,255,.05)'}},
              y:{min:0,max:10,ticks:{color:'#6a8aaa',stepSize:1},grid:{color:'rgba(255,255,255,.05)'}}}
    }});
    const dist=[0,0,0,0];
    rpes.forEach(v=>{if(v<=3)dist[0]++;else if(v<=6)dist[1]++;else if(v<=8)dist[2]++;else dist[3]++;});
    makeChart('c-rpe-dist',{type:'doughnut',data:{
      labels:['Ligero (1-3)','Moderado (4-6)','Duro (7-8)','Máximo (9-10)'],
      datasets:[{data:dist,backgroundColor:['rgba(34,197,94,.8)','rgba(245,158,11,.8)','rgba(239,68,68,.8)','rgba(124,58,237,.8)'],borderColor:'transparent'}]
    },options:{plugins:{legend:{labels:{color:'#e8f0fa',font:{size:11}}}}}});
    const avg=rpes.length?(rpes.reduce((a,b)=>a+b,0)/rpes.length).toFixed(1):'—';
    document.getElementById('rpe-stats').innerHTML=`
      <div class="card" style="margin-bottom:8px"><div class="card-label">RPE Promedio</div><div class="card-value">${avg}</div></div>
      <div class="card" style="margin-bottom:8px"><div class="card-label">RPE Máximo</div><div class="card-value" style="color:var(--red)">${rpes.length?Math.max(...rpes):'—'}</div></div>
      <div class="card"><div class="card-label">Sesiones</div><div class="card-value">${rpes.length}</div></div>`;
    const coms=data.filter(r=>r[3]);
    document.getElementById('rpe-comments').innerHTML=coms.length
      ?`<div class="section-title mb16">Comentarios Post-Sesión</div>`+coms.map(r=>`<div class="comment-item" style="border-left-color:${rpeColor(r[2])}"><div class="comment-date">${r[0]} · RPE ${r[2]}</div><div class="comment-text">💬 ${r[3]}</div></div>`).join(''):'';
  }

  /* ---- INIT ---- */
  renderRpeEquipo(latestDate);
  document.getElementById('sel-fecha-r').addEventListener('change', e=>renderRpeEquipo(e.target.value));
  document.getElementById('btn-mode-rpe-eq').addEventListener('click',()=>{
    document.getElementById('view-rpe-eq').style.display='';
    document.getElementById('view-rpe-ind').style.display='none';
    document.getElementById('ctrl-rpe-eq').style.display='flex';
    document.getElementById('ctrl-rpe-ind').style.display='none';
    document.getElementById('btn-mode-rpe-eq').classList.add('active');
    document.getElementById('btn-mode-rpe-ind').classList.remove('active');
  });
  document.getElementById('btn-mode-rpe-ind').addEventListener('click',()=>{
    document.getElementById('view-rpe-eq').style.display='none';
    document.getElementById('view-rpe-ind').style.display='';
    document.getElementById('ctrl-rpe-eq').style.display='none';
    document.getElementById('ctrl-rpe-ind').style.display='flex';
    document.getElementById('btn-mode-rpe-eq').classList.remove('active');
    document.getElementById('btn-mode-rpe-ind').classList.add('active');
    renderRpeInd();
  });
  document.getElementById('sel-jug-r').addEventListener('change', renderRpeInd);
  document.getElementById('sel-mc-r').addEventListener('change', renderRpeInd);
}

/* ===== SESSION STORAGE ===== */
const _SK = 'monitoreo_u17_sessions';
const _getSessions = () => JSON.parse(localStorage.getItem(_SK)||'[]');
const _saveSessions = arr => localStorage.setItem(_SK, JSON.stringify(arr));
const _addSession = s => { const a=_getSessions(); a.unshift(s); _saveSessions(a); };
const _deleteSession = id => _saveSessions(_getSessions().filter(s=>s.id!==id));

const TACTICO_OPTS = ['Sintético + Global','Técnico + Sint + Global','Técnico + Partido','Partido','Analítico'];
const FISICO_OPTS  = ['Control Motor','Fza estructural','Potencia','Descarga activa','Sin trabajo físico'];

function toHTMLDate(ddmmyyyy) {
  if (!ddmmyyyy) return '';
  const [d,m,y] = ddmmyyyy.split('/');
  return `${y}-${m}-${d}`;
}
function fromHTMLDate(yyyymmdd) {
  if (!yyyymmdd) return '';
  const [y,m,d] = yyyymmdd.split('-');
  return `${d}/${m}/${y}`;
}
function todayHTML() {
  const n = new Date();
  return `${n.getFullYear()}-${String(n.getMonth()+1).padStart(2,'0')}-${String(n.getDate()).padStart(2,'0')}`;
}

function renderBase() {
  const el = document.getElementById('tab-base');

  el.innerHTML = `
    <div class="ns-header">
      <div class="mode-toggle">
        <button class="mode-btn active" id="btn-ns-form">⊕ Nueva Sesión</button>
        <button class="mode-btn" id="btn-ns-hist">📋 Historial</button>
      </div>
      <span style="font-size:12px;color:var(--muted)" id="ns-session-count"></span>
    </div>
    <div id="ns-view-form"></div>
    <div id="ns-view-hist" style="display:none"></div>
  `;

  /* ---- helpers ---- */
  const posMap = {};
  JUGADORES.forEach(([j,p])=>{ posMap[j]=p; });
  const rpeForDate = fecha => {
    const map = {};
    RPE_RAW.filter(r=>r[0]===fecha).forEach(r=>{ map[r[1]]=r[2]; });
    return map;
  };
  const welForDate = fecha => {
    const map = {};
    WELLNESS_RAW.filter(r=>r[0]===fecha).forEach(r=>{ map[r[1]]={sue:r[2],can:r[3],dom:r[4],est:r[5],ani:r[6],tot:r[2]+r[3]+r[4]+r[5]+r[6]}; });
    return map;
  };
  const rpeColor = v => !v?'var(--muted)':v<=3?'#22c55e':v<=6?'#f59e0b':v<=8?'#ef4444':'#a78bfa';

  /* ---- FORM ---- */
  function renderForm() {
    const jugadores = JUGADORES.length ? JUGADORES.map(r=>r[0]) : uniqueSorted(WELLNESS_RAW, r=>r[1]);
    document.getElementById('ns-view-form').innerHTML = `
      <div class="card">
        <div style="font-size:13px;color:var(--muted);margin-bottom:16px">
          Completá los datos de la sesión. El RPE y el Wellness se traen automáticamente de los formularios del día.
        </div>
        <div class="ns-fields">
          <div class="ns-field">
            <label>Fecha</label>
            <input type="date" id="ns-fecha" value="${todayHTML()}">
          </div>
          <div class="ns-field">
            <label>Microciclo</label>
            <select id="ns-mc">
              <option value="1">MC 1 — Abril</option>
              <option value="2">MC 2 — Mayo</option>
              <option value="3" selected>MC 3 — Junio</option>
              <option value="4">MC 4</option>
            </select>
          </div>
          <div class="ns-field">
            <label>Estímulo Táctico</label>
            <select id="ns-tac">
              ${TACTICO_OPTS.map(o=>`<option value="${o}">${o}</option>`).join('')}
            </select>
          </div>
          <div class="ns-field">
            <label>Estímulo Físico</label>
            <select id="ns-fis">
              ${FISICO_OPTS.map(o=>`<option value="${o}">${o}</option>`).join('')}
            </select>
          </div>
          <div class="ns-field">
            <label>Minutos Totales</label>
            <input type="number" id="ns-min" placeholder="ej: 90" min="0" max="480" style="font-size:18px;font-weight:800">
          </div>
        </div>

        <div style="overflow-x:auto">
          <table class="ns-players-table">
            <thead>
              <tr>
                <th style="width:36px">
                  <input type="checkbox" class="ns-chk" id="chk-all" checked title="Seleccionar todos">
                </th>
                <th>JUGADOR</th>
                <th>POSICIÓN</th>
                <th style="text-align:center">RPE HOY</th>
                <th style="text-align:center">sRPE (UA)</th>
                <th style="text-align:center">WELLNESS HOY</th>
              </tr>
            </thead>
            <tbody id="ns-tbody">
              ${jugadores.map(j=>`
                <tr id="ns-row-${j.replace(/\s/g,'_')}" class="">
                  <td><input type="checkbox" class="ns-chk ns-player-chk" data-jug="${j}" checked></td>
                  <td><strong>${j}</strong></td>
                  <td style="color:var(--muted)">${posMap[j]||'—'}</td>
                  <td style="text-align:center" id="ns-rpe-${j.replace(/\s/g,'_')}">—</td>
                  <td style="text-align:center;font-weight:700" id="ns-srpe-${j.replace(/\s/g,'_')}">—</td>
                  <td style="text-align:center" id="ns-wel-${j.replace(/\s/g,'_')}">—</td>
                </tr>`).join('')}
            </tbody>
          </table>
        </div>

        <div class="ns-summary" id="ns-summary">
          <div class="ns-summary-item"><div class="ns-summary-val" id="ns-sum-jug">0</div><div class="ns-summary-lbl">Jugadores</div></div>
          <div class="ns-summary-item"><div class="ns-summary-val" id="ns-sum-min">—</div><div class="ns-summary-lbl">Minutos</div></div>
          <div class="ns-summary-item"><div class="ns-summary-val" id="ns-sum-rpe">—</div><div class="ns-summary-lbl">RPE Prom.</div></div>
          <div class="ns-summary-item"><div class="ns-summary-val" id="ns-sum-srpe">—</div><div class="ns-summary-lbl">sRPE Prom.</div></div>
          <div style="flex:1"></div>
          <button class="btn-save" id="btn-guardar">✓ Guardar Sesión</button>
        </div>
      </div>
    `;

    const jugList = JUGADORES.length ? JUGADORES.map(r=>r[0]) : uniqueSorted(WELLNESS_RAW, r=>r[1]);

    function updateRows() {
      const fecha  = fromHTMLDate(document.getElementById('ns-fecha').value);
      const min    = parseInt(document.getElementById('ns-min').value)||0;
      const rpeMap = rpeForDate(fecha);
      const welMap = welForDate(fecha);
      let checked=0, rpeSum=0, rpeCount=0, srpeSum=0;

      jugList.forEach(j=>{
        const key = j.replace(/\s/g,'_');
        const chk = document.querySelector(`.ns-player-chk[data-jug="${j}"]`);
        const isChk = chk?.checked;
        const row   = document.getElementById(`ns-row-${key}`);
        const rpe   = rpeMap[j];
        const wel   = welMap[j];
        const srpe  = (rpe && min) ? rpe*min : null;

        const rpeEl  = document.getElementById(`ns-rpe-${key}`);
        const srpeEl = document.getElementById(`ns-srpe-${key}`);
        const welEl  = document.getElementById(`ns-wel-${key}`);

        if (rpeEl)  rpeEl.innerHTML  = rpe  ? `<span style="color:${rpeColor(rpe)};font-weight:800;font-size:16px">${rpe}</span>` : '<span style="color:var(--muted)">—</span>';
        if (srpeEl) srpeEl.innerHTML = srpe ? `<span style="color:var(--blue);font-weight:800">${srpe.toLocaleString()} UA</span>` : '<span style="color:var(--muted)">—</span>';
        if (welEl)  welEl.innerHTML  = wel  ? `${pill(colorWellness(wel.tot), wel.tot)}` : '<span style="color:var(--muted)">—</span>';
        if (row)    row.classList.toggle('unchecked', !isChk);

        if (isChk) {
          checked++;
          if (rpe) { rpeSum+=rpe; rpeCount++; }
          if (srpe) srpeSum+=srpe;
        }
      });

      document.getElementById('ns-sum-jug').textContent  = checked;
      document.getElementById('ns-sum-min').textContent  = min || '—';
      document.getElementById('ns-sum-rpe').textContent  = rpeCount ? (rpeSum/rpeCount).toFixed(1) : '—';
      document.getElementById('ns-sum-srpe').textContent = srpeSum  ? Math.round(srpeSum/Math.max(rpeCount,1)).toLocaleString() : '—';
    }

    // Save
    document.getElementById('btn-guardar').addEventListener('click', ()=>{
      const fecha  = fromHTMLDate(document.getElementById('ns-fecha').value);
      const mc     = +document.getElementById('ns-mc').value;
      const tac    = document.getElementById('ns-tac').value;
      const fis    = document.getElementById('ns-fis').value;
      const min    = parseInt(document.getElementById('ns-min').value)||0;
      const rpeMap = rpeForDate(fecha);
      const welMap = welForDate(fecha);

      const players = [];
      jugList.forEach(j=>{
        const chk = document.querySelector(`.ns-player-chk[data-jug="${j}"]`);
        if (!chk?.checked) return;
        const rpe  = rpeMap[j]||null;
        const wel  = welMap[j]||null;
        const srpe = (rpe && min) ? rpe*min : null;
        players.push({ jugador:j, pos:posMap[j]||'', rpe, srpe, wel });
      });

      if (!players.length) { alert('Seleccioná al menos un jugador.'); return; }
      if (!min) { alert('Ingresá los minutos de la sesión.'); return; }

      _addSession({ id: Date.now(), fecha, mc, tac, fis, min, comb:`${tac} + ${fis}`, players });

      // Confirmar
      const btn = document.getElementById('btn-guardar');
      btn.textContent = '✓ Guardado!';
      btn.style.background = '#22c55e';
      setTimeout(()=>{ btn.textContent='✓ Guardar Sesión'; btn.style.background=''; updateSessionCount(); }, 1500);
      updateSessionCount();
    });

    // Checkbox todos
    document.getElementById('chk-all').addEventListener('change', e=>{
      document.querySelectorAll('.ns-player-chk').forEach(c=>{ c.checked=e.target.checked; });
      updateRows();
    });

    // Eventos
    document.getElementById('ns-fecha').addEventListener('change', updateRows);
    document.getElementById('ns-min').addEventListener('input', updateRows);
    document.querySelectorAll('.ns-player-chk').forEach(c=>c.addEventListener('change', updateRows));
    updateRows();
  }

  /* ---- HISTORIAL ---- */
  function renderHistorial() {
    const sessions = _getSessions();
    document.getElementById('ns-view-hist').innerHTML = sessions.length===0
      ? `<div class="card" style="text-align:center;padding:40px;color:var(--muted)">
          <div style="font-size:32px;margin-bottom:12px">📋</div>
          <div>Todavía no cargaste ninguna sesión desde la app.</div>
          <div style="margin-top:8px;font-size:12px">Usá el botón "⊕ Nueva Sesión" para cargar una.</div>
        </div>`
      : `<div class="tbl-wrap">
          <table>
            <thead><tr>
              <th>FECHA</th><th>MC</th><th>TÁCTICO</th><th>FÍSICO</th>
              <th style="text-align:center">MIN</th>
              <th style="text-align:center">JUGADORES</th>
              <th style="text-align:center">RPE PROM</th>
              <th style="text-align:center">sRPE PROM</th>
              <th></th>
            </tr></thead>
            <tbody>
              ${sessions.map(s=>{
                const rpes  = s.players.map(p=>p.rpe).filter(Boolean);
                const srpes = s.players.map(p=>p.srpe).filter(Boolean);
                const avgRpe  = rpes.length ? (rpes.reduce((a,b)=>a+b,0)/rpes.length).toFixed(1) : '—';
                const avgSrpe = srpes.length? Math.round(srpes.reduce((a,b)=>a+b,0)/srpes.length).toLocaleString() : '—';
                return `<tr class="hist-row-saved">
                  <td>${s.fecha}</td>
                  <td>MC ${s.mc}</td>
                  <td style="font-size:12px">${s.tac}</td>
                  <td style="font-size:12px">${s.fis}</td>
                  <td style="text-align:center;font-weight:700">${s.min}'</td>
                  <td style="text-align:center">${s.players.length}</td>
                  <td style="text-align:center">${avgRpe}</td>
                  <td style="text-align:center;color:var(--blue);font-weight:700">${avgSrpe}</td>
                  <td><button class="btn-del" onclick="delSession(${s.id})">✕</button></td>
                </tr>
                ${s.players.map(p=>`
                  <tr style="background:rgba(116,172,223,.03)">
                    <td style="color:var(--muted);font-size:11px;padding-left:24px">↳ ${p.jugador}</td>
                    <td></td>
                    <td colspan="2" style="color:var(--muted);font-size:11px">${p.pos}</td>
                    <td></td>
                    <td></td>
                    <td style="text-align:center">${p.rpe||'—'}</td>
                    <td style="text-align:center;color:var(--blue);font-size:12px;font-weight:700">${p.srpe?p.srpe.toLocaleString()+' UA':'—'}</td>
                    <td></td>
                  </tr>`).join('')}`;
              }).join('')}
            </tbody>
          </table>
        </div>`;
  }

  /* ---- helpers ---- */
  function updateSessionCount() {
    const n = _getSessions().length;
    document.getElementById('ns-session-count').textContent = n ? `${n} sesión${n!==1?'es':''} guardada${n!==1?'s':''}` : '';
  }

  window.delSession = function(id) {
    if (!confirm('¿Eliminar esta sesión?')) return;
    _deleteSession(id);
    renderHistorial();
    updateSessionCount();
  };

  /* ---- INIT ---- */
  updateSessionCount();
  renderForm();

  document.getElementById('btn-ns-form').addEventListener('click',()=>{
    document.getElementById('ns-view-form').style.display='';
    document.getElementById('ns-view-hist').style.display='none';
    document.getElementById('btn-ns-form').classList.add('active');
    document.getElementById('btn-ns-hist').classList.remove('active');
  });
  document.getElementById('btn-ns-hist').addEventListener('click',()=>{
    document.getElementById('ns-view-form').style.display='none';
    document.getElementById('ns-view-hist').style.display='';
    document.getElementById('btn-ns-form').classList.remove('active');
    document.getElementById('btn-ns-hist').classList.add('active');
    renderHistorial();
  });
}

/* ===== TAB: JUGADORES ===== */
function renderJugadores() {
  const el = document.getElementById('tab-jugadores');
  const posColors = {
    'Punta':'#74acdf','Central':'#22c55e','Armador':'#f59e0b',
    'Opuesto':'#ef4444','Libero':'#a855f7'
  };
  const posCounts = {};
  JUGADORES.forEach(([,p])=>{ posCounts[p]=(posCounts[p]||0)+1; });

  el.innerHTML = `
    <div class="cards-row mb16">
      ${Object.entries(posCounts).map(([p,n])=>`
        <div class="card">
          <div class="card-label">${p}</div>
          <div class="card-value" style="color:${posColors[p]||'var(--blue)'}">${n}</div>
          <div class="card-sub">jugadores</div>
        </div>`).join('')}
      <div class="card">
        <div class="card-label">Total Plantilla</div>
        <div class="card-value">${JUGADORES.length}</div>
        <div class="card-sub">jugadores</div>
      </div>
    </div>
    <div class="jugadores-grid">
      ${JUGADORES.map(([nombre,pos],i)=>`
        <div class="jugador-card">
          <div class="jugador-num" style="background:linear-gradient(135deg,${posColors[pos]||'#74acdf'}88,${posColors[pos]||'#74acdf'})">
            ${i+1}
          </div>
          <div>
            <div class="jugador-name">${nombre}</div>
            <div class="jugador-pos">${pos}</div>
          </div>
        </div>`).join('')}
    </div>
  `;
}

/* ===== REFRESH / MONITOREO U17 ===== */
async function doRefresh() {
  const btn = document.getElementById('btn-refresh');
  btn.classList.add('spinning');
  btn.disabled = true;
  btn.textContent = '⟳ Actualizando...';

  if (_connected && _token) {
    await loadLiveData();
  } else {
    const activeTab = document.querySelector('.tab-btn.active').dataset.tab;
    renderActiveTab(activeTab);
    await new Promise(r => setTimeout(r, 900));
    const now = new Date();
    document.getElementById('last-updated').textContent =
      `Actualizado: ${now.toLocaleDateString('es-AR')} ${now.toLocaleTimeString('es-AR',{hour:'2-digit',minute:'2-digit'})}`;
  }

  btn.classList.remove('spinning');
  btn.disabled = false;
  btn.textContent = '⟳ MONITOREO U17';
}

/* ===== TAB SWITCHING ===== */
function renderActiveTab(tab) {
  const renders = {
    grupal: renderGrupal,
    metricas: renderMetricas,
    estimulos: renderEstimulos,
    posiciones: renderPosiciones,
    wellness: renderWellness,
    rpe: renderRPE,
    base: renderBase,
    jugadores: renderJugadores,
  };
  if (renders[tab]) renders[tab]();
}

document.querySelectorAll('.tab-btn').forEach(btn=>{
  btn.addEventListener('click',()=>{
    document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
    document.querySelectorAll('.tab-panel').forEach(p=>p.classList.remove('active'));
    btn.classList.add('active');
    const tab = btn.dataset.tab;
    document.getElementById('tab-'+tab).classList.add('active');
    renderActiveTab(tab);
  });
});

document.getElementById('btn-refresh').addEventListener('click', doRefresh);
document.getElementById('btn-auth').addEventListener('click', handleAuth);

/* ===== INIT ===== */
renderGrupal();
const now = new Date();
document.getElementById('last-updated').textContent =
  `Cargado: ${now.toLocaleDateString('es-AR')} ${now.toLocaleTimeString('es-AR',{hour:'2-digit',minute:'2-digit'})}`;
</script>
